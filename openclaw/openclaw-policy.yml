# ==============================================================================
# NEMOCLAW NETWORK POLICY (Cindy OC - S2 - Lockdown Default)
# ==============================================================================
# Esta política define o que o agente PODE acessar. Tudo o que não está aqui
# é BLOQUEADO por padrão (Deny-by-Default).

sandbox_name: cindy-sandbox

network_policies:
  # Provedores de IA (Inference)
  nvidia_inference:
    endpoints:
      - host: api.nvidia.com
        port: 443
    binaries:
      - path: /openclaw/node_modules/.bin/nemoclaw

  openai_inference:
    endpoints:
      - host: api.openai.com
        port: 443
    binaries:
      - path: /openclaw/node_modules/.bin/nemoclaw

  # Mensageria (Telegram)
  telegram_api:
    endpoints:
      - host: api.telegram.org
        port: 443
    binaries:
      - path: /openclaw/node_modules/.bin/nemoclaw

  # Repositórios de Dependências (Controle de Skills)
  npm_registry:
    endpoints:
      - host: registry.npmjs.org
        port: 443
    binaries:
      - path: /usr/bin/npm

  python_pip:
    endpoints:
      - host: pypi.org
        port: 443
    binaries:
      - path: /usr/bin/pip
      - path: /usr/bin/python3

# Políticas de Arquivo (Invenção DOC2.5: Sandbox isolation)
file_policies:
  - path: /openclaw/skills
    permissions: [read, write]
  - path: /openclaw/logs
    permissions: [read, write]
  - path: /root
    permissions: [deny] # Proteção do Host
